<!DOCTYPE html>
<html>
<head>
  <title>AI Support Widget</title>
  <style>
    body {
      font-family: Arial;
    }

    #chat-box {
      width: 300px;
      height: 400px;
      border: 1px solid #ccc;
      overflow-y: auto;
      padding: 10px;
      margin-bottom: 10px;
    }

    .user {
      text-align: right;
      margin: 5px;
    }

    .bot {
      text-align: left;
      margin: 5px;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px;
    }
  </style>
</head>

<body>

<h3>Support Chat</h3>

<div id="chat-box"></div>

<input id="message" placeholder="Type message..." />
<button onclick="sendMessage()">Send</button>

<script>
  async function sendMessage() {
    const input = document.getElementById("message");
    const chatBox = document.getElementById("chat-box");

    const message = input.value;
    if (!message) return;

    // Show user message
    chatBox.innerHTML += `<div class="user">${message}</div>`;

    input.value = "";

    // Send to backend
    const res = await fetch("http://127.0.0.1:8000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message,
        email: "test@test.com"
      })
    });

    const data = await res.json();

    // Show bot response
    chatBox.innerHTML += `<div class="bot">${data.data.response}</div>`;

    chatBox.scrollTop = chatBox.scrollHeight;
  }
</script>

</body>
</html>
