<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Support Chat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: #1e293b;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      max-width: 75%;
    }

    .user {
      background: #3b82f6;
      align-self: flex-end;
    }

    .bot {
      background: #334155;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #475569;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
      background: #0f172a;
      color: white;
    }

    button {
      padding: 12px;
      background: #22c55e;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="chat-container">
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input id="input" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById("messages");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.classList.add("message", sender);
      div.innerText = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const message = input.value;

      if (!message) return;

      // Show user message
      addMessage(message, "user");
      input.value = "";

      // Show loading state
      const loadingMessage = addMessage("Typing...", "bot");

      try {
        const res = await fetch("http://127.0.0.1:8000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message,
            email: "test@example.com"
          })
        });

        const data = await res.json();

        // Replace loading message with actual response
        loadingMessage.innerText = data.data.response;

      } catch (err) {
        loadingMessage.innerText = "Connection failed. Try again.";
        console.error(err);
      }
    }

    // Enter key support
    document.getElementById("input").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

</body>
</html>
