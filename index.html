<!DOCTYPE html>
<html>
<head>
  <title>AI Support</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }

    .container {
      max-width: 400px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background: black;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #response {
      margin-top: 20px;
      font-weight: bold;
    }

    #loading {
      margin-top: 10px;
      color: gray;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Support Chat</h2>

    <input id="message" placeholder="Type your message..." />
    <input id="email" placeholder="Your email (optional)" />

    <button onclick="sendMessage()">Send</button>

    <div id="loading"></div>
    <p id="response"></p>
  </div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("message").value;
      const email = document.getElementById("email").value;

      const responseEl = document.getElementById("response");
      const loadingEl = document.getElementById("loading");

      if (!message) {
        responseEl.innerText = "Please enter a message.";
        return;
      }

      loadingEl.innerText = "Thinking...";
      responseEl.innerText = "";

      try {
        const res = await fetch("http://127.0.0.1:8000/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message, email })
        });

        const data = await res.json();

        responseEl.innerText = data.reply;
      } catch (err) {
        responseEl.innerText = "Error connecting to server.";
        console.error(err);
      }

      loadingEl.innerText = "";
    }
  </script>
</body>
</html>
